name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build Web
        run: flutter build web --wasm --release --build-number ${{ github.run_number }} --base-href "/${{ github.event.repository.name }}/"

      - name: Update COOP and COEP headers
        run: |
          echo '{
            "headers": [
              {
                "source": "**/*",
                "headers": [
                  {
                    "key": "Cross-Origin-Embedder-Policy",
                    "value": "credentialless"
                  },
                  {
                    "key": "Cross-Origin-Opener-Policy",
                    "value": "same-origin"
                  }
                ]
              }
            ]
          }' > build/web/_headers

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4