name: Publish to GitHub Pages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - master

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}


jobs:
  build:
    runs-on: ubuntu-latest
    environment: pull-requests
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

      - name: Build Web
        run: flutter build web --release --build-number ${{ github.run_number }} --base-href "/${{ env.BRANCH_NAME }}/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ env.BRANCH_NAME }}
          folder: build/web