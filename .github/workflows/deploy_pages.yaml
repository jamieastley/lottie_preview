name: Publish to GitHub Pages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    environment: pull-requests
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

      - name: Build Web
        run: flutter build web --release --wasm --base-href "/lottie-preview/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: jamieastley/lottie_preview
          branch: ${{env.GITHUB_REF_NAME}}
          folder: build/web